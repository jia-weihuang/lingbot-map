# Neural RGB-D — lingbot_map point-cloud evaluation.
# Indoor sequences with GT depth + mesh for surface reconstruction.
workspace: /path/to/workspace/neural_rgbd

datasets:
  - neural_rgbd

methods:
  - lingbot_map

evaluation:
  traj:
    enable: false
  auc:
    enable: false
  depth:
    enable: false
  points:
    enable: true
    vis: false
    icp_threshold: 0.1
